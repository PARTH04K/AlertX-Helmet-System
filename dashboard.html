<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AlertX Dashboard</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body{margin:0}
#map{height:100vh}
.header{
  position:absolute;top:10px;left:50%;transform:translateX(-50%);
  background:#020617;color:#38bdf8;padding:10px 20px;
  border-radius:10px;z-index:1000;
}
.alert{
  position:absolute;bottom:20px;left:50%;
  transform:translateX(-50%);
  background:red;color:white;padding:10px 20px;
  border-radius:10px;font-weight:bold;
  display:none;
}
</style>
</head>

<body>

<div class="header">🚨 AlertX Live Dashboard</div>
<div id="map"></div>
<div id="alertBox" class="alert">ACCIDENT DETECTED!</div>

<script>

// FIREBASE
firebase.initializeApp({
  apiKey: "AIzaSyAOa0jj4lNvLNA-u8FyeyJ7HNoMca8VDgw",
  databaseURL: "https://alertx-system-default-rtdb.asia-southeast1.firebasedatabase.app"
});

firebase.auth().onAuthStateChanged(u=>{
  if(!u) location.href="login.html";
});

const db = firebase.database();

// MAP
var map = L.map('map').setView([23.0225,72.5714],15);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

var marker = L.marker([23.0225,72.5714]).addTo(map);

// LIVE DATA
db.ref("devices/helmet01").on("value", snap=>{
  const d = snap.val();
  if(!d) return;

  marker.setLatLng([d.lat,d.lon]);
  map.setView([d.lat,d.lon]);

  if(d.accident){
    document.getElementById("alertBox").style.display="block";
  }else{
    document.getElementById("alertBox").style.display="none";
  }
});

</script>

</body>
</html>
