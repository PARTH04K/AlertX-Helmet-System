<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AlertX | Live Tracking</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body {
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background:#0f172a;
  color:white;
}

/* HEADER */
header {
  background:#020617;
  padding:15px;
  text-align:center;
  border-bottom:1px solid #1e293b;
}
header h1 {
  color:#38bdf8;
  margin:0;
}

/* STATUS BAR */
.status {
  text-align:center;
  padding:10px;
  font-weight:bold;
}

.safe { color:#22c55e; }
.alert { color:#ef4444; animation: blink 1s infinite; }

@keyframes blink {
  50% { opacity:0.3; }
}

/* MAP */
#map {
  height:75vh;
  width:100%;
}

/* INFO PANEL */
.info {
  padding:15px;
  display:flex;
  justify-content:space-around;
  flex-wrap:wrap;
  background:#020617;
}

.card {
  background:#020617;
  padding:15px;
  border-radius:10px;
  margin:10px;
  box-shadow:0 0 10px rgba(56,189,248,0.2);
}
</style>
</head>

<body>

<header>
  <h1>🚨 AlertX Live Tracking</h1>
</header>

<div id="status" class="status safe">Connecting...</div>

<div id="map"></div>

<div class="info">
  <div class="card">
    <h3>Latitude</h3>
    <p id="lat">--</p>
  </div>
  <div class="card">
    <h3>Longitude</h3>
    <p id="lon">--</p>
  </div>
  <div class="card">
    <h3>Status</h3>
    <p id="accidentStatus">--</p>
  </div>
</div>

<script>

// ===== FIREBASE CONFIG =====
firebase.initializeApp({
  apiKey: "YOUR_API_KEY",
  databaseURL: "https://alertx-system-default-rtdb.asia-southeast1.firebasedatabase.app"
});

const db = firebase.database();

// ===== MAP INIT =====
var map = L.map('map').setView([23.0225, 72.5714], 15);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19
}).addTo(map);

var marker = L.marker([23.0225, 72.5714]).addTo(map);

// ===== REALTIME LISTENER =====
db.ref("devices/helmet01").on("value", snap => {
  const d = snap.val();
  if (!d) return;

  let lat = d.lat;
  let lon = d.lon;

  // Update marker
  marker.setLatLng([lat, lon]);
  map.setView([lat, lon]);

  // Update UI
  document.getElementById("lat").innerText = lat.toFixed(6);
  document.getElementById("lon").innerText = lon.toFixed(6);

  if (d.accident) {
    document.getElementById("status").innerText = "🚨 ACCIDENT DETECTED!";
    document.getElementById("status").className = "status alert";
    document.getElementById("accidentStatus").innerText = "CRITICAL";
  } else {
    document.getElementById("status").innerText = "✅ Normal";
    document.getElementById("status").className = "status safe";
    document.getElementById("accidentStatus").innerText = "SAFE";
  }
});

</script>

</body>
</html>
